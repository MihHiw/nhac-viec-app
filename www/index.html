<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nhắc Ơi — trợ lý nhắc việc</title>
<meta name="theme-color" content="#12141C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nhắc Ơi">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#12141c;
  --bg-2:#0d0f16;
  --surface:#1b1e2a;
  --surface-2:#232838;
  --border:#2b3040;
  --text:#edeff6;
  --text-muted:#8b91a8;
  --accent:#e8a33d;
  --accent-soft:rgba(232,163,61,.16);
  --today:#4fbdba;
  --today-soft:rgba(79,189,186,.15);
  --danger:#e2637a;
  --radius:16px;
  --font-display:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(600px 400px at 100% -10%, rgba(232,163,61,.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  display:flex;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
}
#app{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
  background:var(--bg-2);
  position:relative;
  overflow:hidden;
}

/* ---------- Header ---------- */
header{
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(232,163,61,.06), transparent);
  flex-shrink:0;
}
.lamp{
  width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:var(--accent-soft);
}
.lamp svg{width:19px;height:19px;}
header h1{
  font-family:var(--font-display);
  font-size:19px;
  font-weight:600;
  margin:0;
  letter-spacing:.2px;
}
header p{
  margin:1px 0 0;
  font-size:12px;
  color:var(--text-muted);
}
#notif-btn{
  margin-left:auto;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-muted);
  font-size:11px;
  padding:7px 10px;
  border-radius:99px;
  font-family:var(--font-body);
  cursor:pointer;
}
#notif-btn.on{color:var(--today);border-color:rgba(79,189,186,.4);}

/* ---------- Today strip ---------- */
#today-strip{
  flex-shrink:0;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:none;
}
#today-strip.show{display:block;}
#today-strip .label{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--today);
  margin-bottom:8px;
}
.today-list{display:flex;flex-direction:column;gap:6px;}
.today-item{
  display:flex;align-items:center;gap:8px;
  font-size:13px;
  padding:8px 10px;
  background:var(--today-soft);
  border-radius:10px;
  border:1px solid rgba(79,189,186,.25);
}
.today-item .t{font-family:var(--font-mono);color:var(--today);font-size:12px;min-width:44px;}
.today-item .txt{flex:1;}
.today-item.done{opacity:.45;text-decoration:line-through;}

/* ---------- Chat ---------- */
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px 16px 10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.msg{max-width:86%;display:flex;flex-direction:column;gap:4px;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.bot{align-self:flex-start;align-items:flex-start;}
.bubble{
  padding:10px 14px;
  border-radius:16px;
  font-size:14.5px;
  line-height:1.45;
}
.msg.user .bubble{
  background:var(--accent);
  color:#221604;
  border-bottom-right-radius:4px;
}
.msg.bot .bubble{
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg .time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);}

/* ticket-style task card */
.ticket{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  max-width:86%;
  align-self:flex-start;
}
.ticket .stub{
  background:var(--accent-soft);
  border-right:1px dashed rgba(232,163,61,.4);
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:64px;
  text-align:center;
}
.ticket .stub .d{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.ticket .stub .m{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;}
.ticket .body{padding:11px 13px;flex:1;}
.ticket .body .txt{font-size:14px;line-height:1.4;}
.ticket .body .meta{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:5px;}
.ticket .body .actions{display:flex;gap:10px;margin-top:8px;}
.ticket .body .actions button{
  background:none;border:none;color:var(--text-muted);
  font-family:var(--font-body);font-size:11.5px;cursor:pointer;padding:2px 0;
}
.ticket .body .actions button.done-btn{color:var(--today);}
.ticket .body .actions button.del-btn{color:var(--danger);}
.ticket.done{opacity:.5;}
.ticket.done .txt{text-decoration:line-through;}

/* ---------- Input ---------- */
#input-bar{
  flex-shrink:0;
  display:flex;
  gap:8px;
  padding:12px 14px calc(env(safe-area-inset-bottom,0px) + 12px);
  border-top:1px solid var(--border);
  background:var(--bg-2);
}
#input-bar textarea{
  flex:1;
  resize:none;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:14px;
  padding:11px 14px;
  font-family:var(--font-body);
  font-size:14.5px;
  line-height:1.4;
  max-height:100px;
}
#input-bar textarea:focus{outline:none;border-color:var(--accent);}
#input-bar textarea::placeholder{color:var(--text-muted);}
#send-btn{
  width:44px;height:44px;flex-shrink:0;
  border-radius:50%;
  background:var(--accent);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
#send-btn svg{width:18px;height:18px;}

/* scrollbar */
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.empty-hint{
  color:var(--text-muted);
  font-size:13px;
  text-align:center;
  margin:auto;
  padding:30px 20px;
  line-height:1.6;
}
.empty-hint b{color:var(--text);}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="lamp">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 2.5 1.5 4 2.5 5.5S9 17 9 18h6c0-1 .5-1.5 1.5-3S19 11.5 19 9a7 7 0 0 0-7-7Z"/></svg>
    </div>
    <div>
      <h1>Nhắc Ơi</h1>
      <p>Gõ việc cần làm, mình nhớ giúp bạn</p>
    </div>
    <button id="notif-btn">🔔 Bật nhắc</button>
  </header>

  <div id="today-strip"><div class="label">Hôm nay</div><div class="today-list"></div></div>

  <div id="chat"></div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="vd: mai tui cần họp lúc 9h..."></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#221604" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>
</div>

<script src="bundle.js"></script>
</body>
</html>
