<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nhắc Ơi — trợ lý nhắc việc</title>
<meta name="theme-color" content="#12141C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nhắc Ơi">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#12141c;
  --bg-2:#0d0f16;
  --surface:#1b1e2a;
  --surface-2:#232838;
  --border:#2b3040;
  --text:#edeff6;
  --text-muted:#8b91a8;
  --accent:#e8a33d;
  --accent-soft:rgba(232,163,61,.16);
  --today:#4fbdba;
  --today-soft:rgba(79,189,186,.15);
  --danger:#e2637a;
  --radius:16px;
  --font-display:'Fraunces',serif;
  --font-body:'Inter',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(600px 400px at 100% -10%, rgba(232,163,61,.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  display:flex;
  justify-content:center;
  min-height:100vh;
  min-height:100dvh;
}
#app{
  width:100%;
  max-width:520px;
  display:flex;
  flex-direction:column;
  height:100vh;
  height:100dvh;
  background:var(--bg-2);
  position:relative;
  overflow:hidden;
}

/* ---------- Header ---------- */
header{
  padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 14px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg, rgba(232,163,61,.06), transparent);
  flex-shrink:0;
}
.lamp{
  width:34px;height:34px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  background:var(--accent-soft);
}
.lamp svg{width:19px;height:19px;}
header h1{
  font-family:var(--font-display);
  font-size:19px;
  font-weight:600;
  margin:0;
  letter-spacing:.2px;
}
header p{
  margin:1px 0 0;
  font-size:12px;
  color:var(--text-muted);
}
#notif-btn{
  margin-left:auto;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text-muted);
  font-size:11px;
  padding:7px 10px;
  border-radius:99px;
  font-family:var(--font-body);
  cursor:pointer;
}
#notif-btn.on{color:var(--today);border-color:rgba(79,189,186,.4);}

/* ---------- Today strip ---------- */
#today-strip{
  flex-shrink:0;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  display:none;
}
#today-strip.show{display:block;}
#today-strip .label{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--today);
  margin-bottom:8px;
}
.today-list{display:flex;flex-direction:column;gap:6px;}
.today-item{
  display:flex;align-items:center;gap:8px;
  font-size:13px;
  padding:8px 10px;
  background:var(--today-soft);
  border-radius:10px;
  border:1px solid rgba(79,189,186,.25);
}
.today-item .t{font-family:var(--font-mono);color:var(--today);font-size:12px;min-width:44px;}
.today-item .txt{flex:1;}
.today-item.done{opacity:.45;text-decoration:line-through;}

/* ---------- Chat ---------- */
#chat{
  flex:1;
  overflow-y:auto;
  padding:18px 16px 10px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.msg{max-width:86%;display:flex;flex-direction:column;gap:4px;}
.msg.user{align-self:flex-end;align-items:flex-end;}
.msg.bot{align-self:flex-start;align-items:flex-start;}
.bubble{
  padding:10px 14px;
  border-radius:16px;
  font-size:14.5px;
  line-height:1.45;
}
.msg.user .bubble{
  background:var(--accent);
  color:#221604;
  border-bottom-right-radius:4px;
}
.msg.bot .bubble{
  background:var(--surface);
  border:1px solid var(--border);
  border-bottom-left-radius:4px;
}
.msg .time{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);}

/* ticket-style task card */
.ticket{
  display:flex;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
  max-width:86%;
  align-self:flex-start;
}
.ticket .stub{
  background:var(--accent-soft);
  border-right:1px dashed rgba(232,163,61,.4);
  padding:12px 10px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-width:64px;
  text-align:center;
}
.ticket .stub .d{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.ticket .stub .m{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);text-transform:uppercase;margin-top:2px;}
.ticket .body{padding:11px 13px;flex:1;}
.ticket .body .txt{font-size:14px;line-height:1.4;}
.ticket .body .meta{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:5px;}
.ticket .body .actions{display:flex;gap:10px;margin-top:8px;}
.ticket .body .actions button{
  background:none;border:none;color:var(--text-muted);
  font-family:var(--font-body);font-size:11.5px;cursor:pointer;padding:2px 0;
}
.ticket .body .actions button.done-btn{color:var(--today);}
.ticket .body .actions button.del-btn{color:var(--danger);}
.ticket.done{opacity:.5;}
.ticket.done .txt{text-decoration:line-through;}

/* ---------- Input ---------- */
#input-bar{
  flex-shrink:0;
  display:flex;
  gap:8px;
  padding:12px 14px calc(env(safe-area-inset-bottom,0px) + 12px);
  border-top:1px solid var(--border);
  background:var(--bg-2);
}
#input-bar textarea{
  flex:1;
  resize:none;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  border-radius:14px;
  padding:11px 14px;
  font-family:var(--font-body);
  font-size:14.5px;
  line-height:1.4;
  max-height:100px;
}
#input-bar textarea:focus{outline:none;border-color:var(--accent);}
#input-bar textarea::placeholder{color:var(--text-muted);}
#send-btn{
  width:44px;height:44px;flex-shrink:0;
  border-radius:50%;
  background:var(--accent);
  border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
}
#send-btn svg{width:18px;height:18px;}

/* scrollbar */
#chat::-webkit-scrollbar{width:4px;}
#chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

.empty-hint{
  color:var(--text-muted);
  font-size:13px;
  text-align:center;
  margin:auto;
  padding:30px 20px;
  line-height:1.6;
}
.empty-hint b{color:var(--text);}
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="lamp">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-7 7c0 2.5 1.5 4 2.5 5.5S9 17 9 18h6c0-1 .5-1.5 1.5-3S19 11.5 19 9a7 7 0 0 0-7-7Z"/></svg>
    </div>
    <div>
      <h1>Nhắc Ơi</h1>
      <p>Gõ việc cần làm, mình nhớ giúp bạn</p>
    </div>
    <button id="notif-btn">🔔 Bật nhắc</button>
  </header>

  <div id="today-strip"><div class="label">Hôm nay</div><div class="today-list"></div></div>

  <div id="chat"></div>

  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="vd: mai tui cần họp lúc 9h..."></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#221604" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
    </button>
  </div>
</div>

<script>
/* ============ STORAGE ============ */
const STORE_KEY = 'nhacoi_tasks_v1';
const CHAT_KEY = 'nhacoi_chat_v1';

function loadTasks(){ try{ return JSON.parse(localStorage.getItem(STORE_KEY)) || []; }catch(e){ return []; } }
function saveTasks(t){ localStorage.setItem(STORE_KEY, JSON.stringify(t)); }
function loadChat(){ try{ return JSON.parse(localStorage.getItem(CHAT_KEY)) || []; }catch(e){ return []; } }
function saveChat(c){ localStorage.setItem(CHAT_KEY, JSON.stringify(c)); }

let tasks = loadTasks();
let chatLog = loadChat();

/* ============ DATE/TIME PARSING (Vietnamese, best-effort) ============ */
const WEEKDAYS = { 'chủ nhật':0, 'cn':0, 'thứ 2':1,'thứ hai':1,'thứ 3':2,'thứ ba':2,'thứ 4':3,'thứ tư':3,
  'thứ 5':4,'thứ năm':4,'thứ 6':5,'thứ sáu':5,'thứ 7':6,'thứ bảy':6 };
const MONTH_NAMES = ['Th1','Th2','Th3','Th4','Th5','Th6','Th7','Th8','Th9','Th10','Th11','Th12'];

function stripAccentsLower(s){
  return s.toLowerCase();
}

function parseDate(text){
  const now = new Date();
  const t = text.toLowerCase();

  if(/\bhôm nay\b/.test(t)) return startOfDay(now);
  if(/\bngày mốt\b|\bmốt\b/.test(t)) return addDays(now,2);
  if(/\bngày mai\b|\bmai\b/.test(t)) return addDays(now,1);
  if(/\bhôm qua\b/.test(t)) return startOfDay(now); // không cho lùi ngày, coi như hôm nay

  // dd/mm/yyyy or dd/mm
  let m = t.match(/(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?/);
  if(m){
    let d = parseInt(m[1],10), mo = parseInt(m[2],10)-1;
    let y = m[3] ? (m[3].length===2 ? 2000+parseInt(m[3],10) : parseInt(m[3],10)) : now.getFullYear();
    let candidate = new Date(y, mo, d);
    if(!m[3] && candidate < startOfDay(now)) candidate.setFullYear(y+1);
    return startOfDay(candidate);
  }

  // "ngày 20" (this month, or next month if already passed)
  m = t.match(/\bngày (\d{1,2})\b/);
  if(m){
    let d = parseInt(m[1],10);
    let candidate = new Date(now.getFullYear(), now.getMonth(), d);
    if(candidate < startOfDay(now)) candidate.setMonth(candidate.getMonth()+1);
    return startOfDay(candidate);
  }

  // weekday names, e.g. "thứ 2", "thứ hai tuần sau"
  for(const key in WEEKDAYS){
    if(t.includes(key)){
      const target = WEEKDAYS[key];
      let d = addDays(now, ( (target - now.getDay() + 7) % 7 ) || 7);
      if(/tuần sau|tuần tới/.test(t)) d = addDays(d,7);
      else {
        // if it's today's weekday and no "tuần sau", allow today
        const diff = (target - now.getDay() + 7) % 7;
        d = diff===0 ? startOfDay(now) : addDays(now, diff);
      }
      return startOfDay(d);
    }
  }

  return null; // không tìm thấy ngày cụ thể -> mặc định hôm nay ở nơi gọi
}

function parseTime(text){
  const t = text.toLowerCase();
  // Hh:mm or Hh mm or Hh
  let m = t.match(/(\d{1,2})[h:](\d{2})?/);
  if(!m) return null;
  let h = parseInt(m[1],10);
  let min = m[2] ? parseInt(m[2],10) : 0;
  if(/chiều/.test(t) && h < 12) h += 12;
  else if(/tối/.test(t) && h < 12) h += 12;
  else if(/khuya/.test(t) && h < 12) h += 12;
  else if(/trưa/.test(t) && h < 12) h = 12;
  // sáng: giữ nguyên
  if(h > 23) h = 23;
  return { h, m: min };
}

function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
function addDays(d,n){ const x = new Date(d); x.setDate(x.getDate()+n); return x; }

function formatDateShort(d){
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatDateFull(d){
  const days=['CN','Th2','Th3','Th4','Th5','Th6','Th7'];
  return `${days[d.getDay()]}, ${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function isSameDay(a,b){ return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }

/* Extract a clean task label by stripping the date/time phrases we recognized */
function cleanLabel(text){
  let s = text;
  s = s.replace(/\b(hôm nay|ngày mai|mai|ngày mốt|mốt|hôm qua)\b/gi,'');
  s = s.replace(/\d{1,2}[\/\-]\d{1,2}([\/\-]\d{2,4})?/g,'');
  s = s.replace(/\bngày \d{1,2}\b/gi,'');
  s = s.replace(/\b(thứ 2|thứ hai|thứ 3|thứ ba|thứ 4|thứ tư|thứ 5|thứ năm|thứ 6|thứ sáu|thứ 7|thứ bảy|chủ nhật|cn)\b(\s*tuần sau|\s*tuần tới)?/gi,'');
  s = s.replace(/\d{1,2}[h:]\d{0,2}\s*(sáng|chiều|tối|khuya|trưa)?/gi,'');
  s = s.replace(/\blúc\b|\bvào\b/gi,'');
  s = s.replace(/\s{2,}/g,' ').trim();
  s = s.replace(/^[,\.\-–\s]+|[,\.\-–\s]+$/g,'');
  if(s.length===0) s = text.trim();
  return s.charAt(0).toUpperCase() + s.slice(1);
}

/* ============ RENDER ============ */
const chatEl = document.getElementById('chat');
const todayStrip = document.getElementById('today-strip');
const todayList = todayStrip.querySelector('.today-list');

function renderEmptyHintIfNeeded(){
  if(chatLog.length===0){
    chatEl.innerHTML = `<div class="empty-hint">👋 Chào bạn! Cứ gõ việc cần làm theo cách tự nhiên, mình sẽ tự hiểu ngày giờ.<br><br>
    <b>Ví dụ:</b><br>"mai tui cần họp lúc 9h"<br>"20/7 nộp báo cáo"<br>"thứ 6 đi khám răng lúc 3h chiều"</div>`;
  }
}

function addBubble(role, text, time){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;
  wrap.innerHTML = `<div class="bubble"></div><div class="time"></div>`;
  wrap.querySelector('.bubble').textContent = text;
  wrap.querySelector('.time').textContent = time;
  chatEl.appendChild(wrap);
}

function addTicket(task){
  const wrap = document.createElement('div');
  wrap.className = 'ticket' + (task.done ? ' done' : '');
  wrap.dataset.id = task.id;
  const d = new Date(task.date);
  wrap.innerHTML = `
    <div class="stub"><div class="d">${String(d.getDate()).padStart(2,'0')}</div><div class="m">${MONTH_NAMES[d.getMonth()]}</div></div>
    <div class="body">
      <div class="txt">${escapeHtml(task.label)}</div>
      <div class="meta">${formatDateFull(d)}${task.time ? ' · ' + String(task.time.h).padStart(2,'0')+':'+String(task.time.m).padStart(2,'0') : ''}</div>
      <div class="actions">
        <button class="done-btn">${task.done ? '↺ Chưa xong' : '✓ Xong rồi'}</button>
        <button class="del-btn">✕ Xoá</button>
      </div>
    </div>`;
  chatEl.appendChild(wrap);
  wrap.querySelector('.done-btn').onclick = () => toggleDone(task.id);
  wrap.querySelector('.del-btn').onclick = () => deleteTask(task.id);
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function nowHHMM(){
  const n = new Date();
  return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}

function fullRender(){
  chatEl.innerHTML = '';
  renderEmptyHintIfNeeded();
  chatLog.forEach(entry => {
    if(entry.kind === 'bubble') addBubble(entry.role, entry.text, entry.time);
    else if(entry.kind === 'ticket'){
      const task = tasks.find(x => x.id === entry.taskId);
      if(task) addTicket(task);
    }
  });
  chatEl.scrollTop = chatEl.scrollHeight;
  renderTodayStrip();
}

function renderTodayStrip(){
  const today = tasks.filter(t => isSameDay(new Date(t.date), new Date()));
  if(today.length===0){ todayStrip.classList.remove('show'); return; }
  today.sort((a,b) => (a.time?a.time.h*60+a.time.m:1e9) - (b.time?b.time.h*60+b.time.m:1e9));
  todayList.innerHTML = today.map(t => `
    <div class="today-item ${t.done?'done':''}">
      <span class="t">${t.time ? String(t.time.h).padStart(2,'0')+':'+String(t.time.m).padStart(2,'0') : '—'}</span>
      <span class="txt">${escapeHtml(t.label)}</span>
    </div>`).join('');
  todayStrip.classList.add('show');
}

function toggleDone(id){
  const task = tasks.find(x => x.id === id);
  if(!task) return;
  task.done = !task.done;
  saveTasks(tasks);
  fullRender();
}
function deleteTask(id){
  tasks = tasks.filter(x => x.id !== id);
  chatLog = chatLog.filter(e => !(e.kind==='ticket' && e.taskId===id));
  saveTasks(tasks); saveChat(chatLog);
  fullRender();
}

/* ============ SEND / PARSE FLOW ============ */
const input = document.getElementById('msg-input');
const sendBtn = document.getElementById('send-btn');

function handleSend(){
  const text = input.value.trim();
  if(!text) return;
  chatLog.push({kind:'bubble', role:'user', text, time: nowHHMM()});
  addBubble('user', text, nowHHMM());
  input.value = ''; autoGrow();

  let date = parseDate(text);
  const usedDefaultDate = !date;
  if(!date) date = startOfDay(new Date());
  const time = parseTime(text);
  const label = cleanLabel(text);

  const task = {
    id: 't' + Date.now() + Math.random().toString(36).slice(2,6),
    label, date: date.toISOString(), time, done: false, notified: false
  };
  tasks.push(task);
  saveTasks(tasks);

  let botText = usedDefaultDate
    ? `Mình chưa thấy ngày cụ thể nên đã ghi cho hôm nay nhé. Bạn nhắn lại kèm ngày nếu mình hiểu sai 👇`
    : `Đã ghi nhớ cho bạn rồi 👇`;
  chatLog.push({kind:'bubble', role:'bot', text: botText, time: nowHHMM()});
  addBubble('bot', botText, nowHHMM());

  chatLog.push({kind:'ticket', taskId: task.id});
  addTicket(task);

  saveChat(chatLog);
  chatEl.scrollTop = chatEl.scrollHeight;
  renderTodayStrip();
}

sendBtn.onclick = handleSend;
input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); handleSend(); }
});
function autoGrow(){ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,100)+'px'; }
input.addEventListener('input', autoGrow);

/* ============ NOTIFICATIONS ============ */
const notifBtn = document.getElementById('notif-btn');

function refreshNotifBtn(){
  if(!('Notification' in window)){ notifBtn.textContent='Trình duyệt không hỗ trợ'; notifBtn.disabled=true; return; }
  if(Notification.permission === 'granted'){ notifBtn.textContent='🔔 Đã bật nhắc'; notifBtn.classList.add('on'); }
  else { notifBtn.textContent='🔔 Bật nhắc'; notifBtn.classList.remove('on'); }
}
notifBtn.onclick = async () => {
  if(!('Notification' in window)) return;
  const perm = await Notification.requestPermission();
  refreshNotifBtn();
  if(perm === 'granted'){
    new Notification('Nhắc Ơi', { body: 'Đã bật nhắc việc! Mình sẽ báo khi đến giờ nhé.', icon:'icon-192.svg' });
  }
};
refreshNotifBtn();

function checkDueTasks(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  tasks.forEach(t => {
    if(t.done || t.notified) return;
    const d = new Date(t.date);
    if(!isSameDay(d, now)) return;
    if(!t.time){ return; } // việc không giờ cụ thể: bỏ qua thông báo tự động, đã hiện ở "Hôm nay"
    const dueMinutes = t.time.h*60+t.time.m;
    const nowMinutes = now.getHours()*60+now.getMinutes();
    if(nowMinutes >= dueMinutes){
      const late = nowMinutes - dueMinutes > 3;
      new Notification('⏰ ' + t.label, {
        body: (late ? 'Trễ mất rồi, lẽ ra là ' : 'Đến giờ rồi (') + String(t.time.h).padStart(2,'0')+':'+String(t.time.m).padStart(2,'0') + (late ? '' : ')'),
        icon:'icon-192.svg'
      });
      t.notified = true;
      saveTasks(tasks);
    }
  });
}
setInterval(checkDueTasks, 30000);
checkDueTasks();
document.addEventListener('visibilitychange', () => { if(document.visibilityState === 'visible') checkDueTasks(); });

/* Chào buổi sáng: khi mở app lần đầu trong ngày, tóm tắt việc hôm nay */
(function greetIfNewDay(){
  const lastOpen = localStorage.getItem('nhacoi_last_open');
  const todayKey = new Date().toDateString();
  if(lastOpen !== todayKey){
    localStorage.setItem('nhacoi_last_open', todayKey);
    const todays = tasks.filter(t => isSameDay(new Date(t.date), new Date()) && !t.done);
    if(todays.length > 0 && Notification && Notification.permission === 'granted'){
      new Notification('Nhắc Ơi — hôm nay có ' + todays.length + ' việc', {
        body: todays.slice(0,3).map(t=>t.label).join(', '),
        icon:'icon-192.svg'
      });
    }
  }
})();

/* ============ INIT ============ */
fullRender();

/* Service worker (offline + cài lên màn hình chính) */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
